<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      padding: 16px;
    }
    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #22c55e;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h1 .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }
    .dot.on { background: #22c55e; }
    .dot.off { background: #ef4444; }
    .status {
      font-size: 13px;
      color: #a3a3a3;
      margin-bottom: 12px;
      padding: 8px;
      background: #171717;
      border-radius: 6px;
      border: 1px solid #262626;
    }
    .status .label { color: #737373; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
    .status .value { color: #e5e5e5; margin-top: 2px; }
    .field {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 11px;
      color: #737373;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }
    input {
      width: 100%;
      padding: 8px 10px;
      background: #171717;
      border: 1px solid #262626;
      border-radius: 6px;
      color: #e5e5e5;
      font-size: 13px;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
    input:focus {
      outline: none;
      border-color: #22c55e;
    }
    .actions {
      display: flex;
      gap: 8px;
    }
    button {
      flex: 1;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    #connectBtn {
      background: #22c55e;
      color: #000;
    }
    #disconnectBtn {
      background: #ef4444;
      color: #fff;
    }
    .info {
      margin-top: 12px;
      font-size: 11px;
      color: #525252;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h1><span class="dot off" id="statusDot"></span> NeoVision Bridge</h1>

  <div class="status">
    <div class="label">Status</div>
    <div class="value" id="statusText">Checking...</div>
  </div>

  <div class="field">
    <label>WebSocket URL</label>
    <input type="text" id="wsUrl" value="ws://localhost:7665" placeholder="ws://localhost:7665">
  </div>

  <div class="actions">
    <button id="connectBtn">Connect</button>
    <button id="disconnectBtn">Disconnect</button>
  </div>

  <div class="info">
    Connect any AI agent to this Chrome browser via NeoVision MCP.
    Start the bridge server: <code>npx neo-vision --bridge</code>
  </div>

  <script src="popup.js"></script>
</body>
</html>
